<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- The calendar mark from the header, on a filled tile. A bare outline glyph
       would disappear against a dark browser tab; favicons can't follow the
       colour scheme, so the tile carries its own contrast. -->
  <rect width="32" height="32" rx="7" fill="#10b981" />
  <g
    fill="none"
    stroke="#fff"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <rect x="7" y="9" width="18" height="16" rx="2.5" />
    <path d="M11.5 6.5v4M20.5 6.5v4" />
    <path d="M7 14.8h18" />
  </g>
  <g fill="#fff">
    <circle cx="12" cy="19.8" r="1.5" />
    <circle cx="16" cy="19.8" r="1.5" />
    <circle cx="20" cy="19.8" r="1.5" />
  </g>
</svg>
