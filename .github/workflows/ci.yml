name: CI

# Gate for the Git Flow workflow: feature branches PR into `develop`, and
# `develop` PRs into `main`. A PR that is red here should not be merged. Pair
# with branch protection on both `develop` and `main` to enforce it.
on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

jobs:
  check:
    runs-on: ubuntu-latest

    # No database or Google client is reachable from CI, and none is needed:
    # tests mock both, and the app's only page is `force-dynamic`, so nothing is
    # rendered at build time. These placeholders exist purely so module-level
    # setup (the Prisma adapter, the Auth.js config) has something to read.
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/db
      DIRECT_URL: postgresql://user:pass@localhost:5432/db
      AUTH_SECRET: ci-placeholder-secret-not-used-for-anything
      AUTH_GOOGLE_ID: ci-placeholder
      AUTH_GOOGLE_SECRET: ci-placeholder

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      # `npm ci` runs the postinstall `prisma generate`, which the typecheck and
      # build both need — the client is generated, not committed.
      - run: npm ci

      - run: npm run lint

      - run: npx tsc --noEmit

      # NODE_ENV=production mirrors how Vercel invokes the tests inside
      # `build:vercel`. Without it, CI ran them in development and went green
      # while the deploy failed on React's production bundle omitting `act`.
      # CI is only a gate if it fails where the deploy would.
      - run: npx vitest run
        env:
          NODE_ENV: production

      # `build:only` — `build` would re-run the tests that just ran.
      - run: npm run build:only
